<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>לייב - מצב האירוע</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --green:#22c55e;--yellow:#eab308;--orange:#f97316;--red:#ef4444;
      --blue:#3b82f6;--purple:#a855f7;
      --bg:#0a0f1a;--card:#131b2e;--card2:#1a2540;--text:#f1f5f9;--muted:#7a8ba8;
      --border:#1e2d4a;--glow:rgba(59,130,246,.12);
    }
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
      background:var(--bg);color:var(--text);min-height:100dvh;
      background-image:radial-gradient(ellipse at 50% 0%,rgba(59,130,246,.06) 0%,transparent 60%);
    }

    /* Header */
    .header{
      padding:20px 24px 16px;text-align:center;position:relative;
      background:linear-gradient(180deg,rgba(59,130,246,.04) 0%,transparent 100%);
    }
    .header-badge{
      display:inline-flex;align-items:center;gap:6px;
      background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);
      border-radius:20px;padding:4px 14px 4px 10px;font-size:.7rem;font-weight:600;
      color:var(--green);margin-bottom:10px;
    }
    .live-pulse{
      width:8px;height:8px;background:var(--green);border-radius:50%;
      animation:livePulse 2s infinite;position:relative;
    }
    .live-pulse::after{
      content:'';position:absolute;inset:-3px;border-radius:50%;
      border:2px solid var(--green);animation:liveRing 2s infinite;
    }
    @keyframes livePulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes liveRing{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.8);opacity:0}}
    .event-title{font-size:1.4rem;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
    .event-meta{font-size:.8rem;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
    .event-meta .sep{color:var(--border)}

    /* Main Counter */
    .counter-wrap{padding:24px 20px 16px;display:flex;justify-content:center}
    .counter-ring{width:220px;height:220px;position:relative}
    .counter-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
    .counter-ring .track{fill:none;stroke:var(--border);stroke-width:10}
    .counter-ring .progress{
      fill:none;stroke-width:10;stroke-linecap:round;
      transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1),stroke .5s;
      filter:drop-shadow(0 0 8px currentColor);
    }
    .counter-inner{
      position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
    }
    .counter-num{
      font-size:4rem;font-weight:900;line-height:1;letter-spacing:-2px;
      transition:color .5s;
    }
    .counter-label{font-size:.75rem;color:var(--muted);margin-top:4px;font-weight:500}
    .counter-max{font-size:.85rem;color:var(--muted);font-weight:600}

    /* Status Pill */
    .status-pill{
      margin:0 20px 20px;padding:14px 20px;border-radius:14px;text-align:center;
      font-weight:700;font-size:1rem;transition:all .5s;
      border:1px solid transparent;
    }
    .status-ok{background:rgba(34,197,94,.08);color:var(--green);border-color:rgba(34,197,94,.15)}
    .status-warn{background:rgba(234,179,8,.08);color:var(--yellow);border-color:rgba(234,179,8,.15)}
    .status-danger{background:rgba(249,115,22,.08);color:var(--orange);border-color:rgba(249,115,22,.15);animation:statusPulse 2s infinite}
    .status-full{background:rgba(239,68,68,.1);color:var(--red);border-color:rgba(239,68,68,.2);animation:statusPulse 1.5s infinite}
    @keyframes statusPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.85;transform:scale(1.01)}}

    /* Stats Row */
    .stats-row{
      display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
      padding:0 20px 16px;
    }
    .stat-card{
      background:var(--card);border:1px solid var(--border);border-radius:14px;
      padding:14px 10px;text-align:center;position:relative;overflow:hidden;
    }
    .stat-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:var(--stat-accent,var(--blue));opacity:.6;
    }
    .stat-val{font-size:1.6rem;font-weight:800;line-height:1.1}
    .stat-lbl{font-size:.6rem;color:var(--muted);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}

    /* Active Slot Banner */
    .slot-banner{
      margin:0 20px 16px;padding:12px 16px;border-radius:12px;
      display:flex;align-items:center;gap:10px;font-size:.85rem;
      background:var(--card);border:1px solid var(--border);
    }
    .slot-banner-icon{font-size:1.2rem}
    .slot-banner-text{flex:1;font-weight:600}
    .slot-banner-time{font-size:.75rem;color:var(--muted);direction:ltr}

    /* Slots Grid */
    .slots-section{padding:0 20px 24px}
    .section-label{
      font-size:.75rem;font-weight:600;color:var(--muted);margin-bottom:10px;
      text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:8px;
    }
    .section-label::after{content:'';flex:1;height:1px;background:var(--border)}

    .slot-card{
      background:var(--card);border:1px solid var(--border);border-radius:12px;
      padding:12px 14px;margin-bottom:6px;transition:all .3s;
    }
    .slot-card.active{
      border-color:rgba(34,197,94,.3);background:linear-gradient(135deg,rgba(34,197,94,.06),rgba(34,197,94,.02));
      box-shadow:0 0 20px rgba(34,197,94,.08);
    }
    .slot-card.past{opacity:.35}
    .slot-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .slot-name{display:flex;align-items:center;gap:8px}
    .slot-time-text{font-weight:700;font-size:.9rem;direction:ltr}
    .slot-num-text{font-size:.7rem;color:var(--muted)}
    .now-tag{
      font-size:.55rem;padding:2px 8px;border-radius:6px;font-weight:700;
      background:rgba(34,197,94,.15);color:var(--green);
    }
    .slot-count-text{font-size:.85rem;font-weight:700;font-variant-numeric:tabular-nums}
    .slot-bar{height:4px;background:var(--border);border-radius:3px;overflow:hidden}
    .slot-bar-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}

    /* Not configured */
    .empty-state{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:60vh;text-align:center;padding:40px;
    }
    .empty-icon{font-size:4rem;margin-bottom:16px;opacity:.5}
    .empty-title{font-size:1.2rem;font-weight:700;margin-bottom:6px}
    .empty-sub{font-size:.85rem;color:var(--muted)}

    /* Footer */
    .footer{
      text-align:center;padding:16px 20px 24px;font-size:.65rem;color:var(--muted);
    }
    .footer a{color:var(--blue);text-decoration:none}

    /* Animations */
    .fade-in{animation:fadeIn .5s ease-out}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .num-change{animation:numPop .4s ease-out}
    @keyframes numPop{0%{transform:scale(1)}30%{transform:scale(1.15)}100%{transform:scale(1)}}
  </style>
</head>
<body>

<div id="liveApp">
  <!-- Empty state -->
  <div id="emptyState" class="empty-state" style="display:none">
    <div class="empty-icon">📡</div>
    <div class="empty-title">אין אירועים פעילים כרגע</div>
    <div class="empty-sub">העמוד יתעדכן אוטומטית כשיתחיל אירוע</div>
  </div>

  <!-- Main content -->
  <div id="mainContent" style="display:none">
    <div class="header">
      <div class="header-badge"><div class="live-pulse"></div> שידור חי</div>
      <div class="event-title" id="evTitle"></div>
      <div class="event-meta">
        <span id="evDate"></span>
        <span class="sep">|</span>
        <span id="evTime" style="direction:ltr"></span>
        <span id="evAddress" style="display:none"><span class="sep">|</span> <span id="evAddrText"></span></span>
      </div>
    </div>

    <div class="counter-wrap">
      <div class="counter-ring">
        <svg viewBox="0 0 220 220">
          <circle class="track" cx="110" cy="110" r="96" />
          <circle class="progress" id="progressCircle" cx="110" cy="110" r="96" />
        </svg>
        <div class="counter-inner">
          <div class="counter-num" id="countNum">0</div>
          <div class="counter-label">נוכחים כרגע</div>
          <div class="counter-max">מתוך <strong id="maxNum">0</strong></div>
        </div>
      </div>
    </div>

    <div class="status-pill status-ok" id="statusPill">ממתין לאורחים</div>

    <div class="stats-row">
      <div class="stat-card" style="--stat-accent:var(--blue)">
        <div class="stat-val" id="statRegs" style="color:var(--blue)">0</div>
        <div class="stat-lbl">נרשמו מראש</div>
      </div>
      <div class="stat-card" style="--stat-accent:var(--green)">
        <div class="stat-val" id="statVisited" style="color:var(--green)">0</div>
        <div class="stat-lbl">סה"כ ביקרו</div>
      </div>
      <div class="stat-card" style="--stat-accent:var(--purple)">
        <div class="stat-val" id="statWalkins" style="color:var(--purple)">0</div>
        <div class="stat-lbl">מזדמנים</div>
      </div>
    </div>

    <div id="slotBanner" class="slot-banner" style="display:none">
      <div class="slot-banner-icon" id="bannerIcon">🟢</div>
      <div class="slot-banner-text" id="bannerText"></div>
      <div class="slot-banner-time" id="bannerTime"></div>
    </div>

    <div class="slots-section">
      <div class="section-label">סבבים</div>
      <div id="slotsList"></div>
    </div>

    <div class="footer">
      מתעדכן אוטומטית כל 3 שניות &middot; <span>🌈 חברים של טופי בע״מ</span>
    </div>
  </div>
</div>

<script>
const circ = 2 * Math.PI * 96;
let prevCount = -1;
let reconnectDelay = 1000;

function connectSSE() {
  const src = new EventSource('/api/events/public');
  src.onopen = () => { reconnectDelay = 1000; };
  src.onmessage = (e) => {
    try { render(JSON.parse(e.data)); } catch(err) { console.error('Parse error:', err); }
  };
  src.onerror = () => {
    src.close();
    setTimeout(connectSSE, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
  };
}
connectSSE();

function render(state) {
  if (!state.configured) {
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('mainContent').style.display = 'none';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';

  // Event info
  const title = state.eventName ? state.eventName + ' — ' + state.clientName : (state.clientName || 'אירוע');
  document.getElementById('evTitle').textContent = title;
  if (state.date) {
    const d = new Date(state.startTime || state.date);
    document.getElementById('evDate').textContent = d.toLocaleDateString('he-IL', {weekday:'long', day:'numeric', month:'long'});
  }
  // Time range from slots
  const slots = state.slotStats || [];
  if (slots.length > 0) {
    const first = slots[0].label.split(' - ')[0];
    const last = slots[slots.length-1].label.split(' - ')[1];
    document.getElementById('evTime').textContent = first + ' - ' + last;
  }
  if (state.eventAddress) {
    document.getElementById('evAddress').style.display = '';
    document.getElementById('evAddrText').textContent = '📍 ' + state.eventAddress;
  }

  // Counter
  const count = state.currentCount || 0;
  const max = state.maxCapacity || 50;
  const pct = count / max;

  let color;
  if (pct >= 1) color = 'var(--red)';
  else if (pct >= .9) color = 'var(--orange)';
  else if (pct >= .7) color = 'var(--yellow)';
  else color = 'var(--green)';

  const circle = document.getElementById('progressCircle');
  circle.style.strokeDasharray = circ;
  circle.style.strokeDashoffset = circ - (Math.min(pct, 1) * circ);
  circle.style.stroke = color;

  const numEl = document.getElementById('countNum');
  numEl.textContent = count;
  numEl.style.color = color;
  if (prevCount !== count && prevCount >= 0) numEl.classList.add('num-change');
  setTimeout(() => numEl.classList.remove('num-change'), 500);
  prevCount = count;
  document.getElementById('maxNum').textContent = max;

  // Status
  const pill = document.getElementById('statusPill');
  const rem = max - count;
  pill.className = 'status-pill';
  if (count >= max) { pill.classList.add('status-full'); pill.textContent = '⛔ האירוע מלא כרגע'; }
  else if (pct >= .9) { pill.classList.add('status-danger'); pill.textContent = `🔥 נותרו ${rem} מקומות בלבד!`; }
  else if (pct >= .7) { pill.classList.add('status-warn'); pill.textContent = `⚡ נותרו ${rem} מקומות`; }
  else if (count === 0) { pill.classList.add('status-ok'); pill.textContent = '✨ ממתין לאורחים'; }
  else { pill.classList.add('status-ok'); pill.textContent = `✅ ${rem} מקומות פנויים`; }

  // Stats
  document.getElementById('statRegs').textContent = state.totalRegs || 0;
  document.getElementById('statVisited').textContent = state.totalGuests || 0;
  document.getElementById('statWalkins').textContent = state.walkins || 0;

  // Slot banner
  const banner = document.getElementById('slotBanner');
  const now = Date.now();
  if (slots.length > 0) {
    const current = slots.find(s => now >= s.startTime && now < s.endTime);
    const next = slots.find(s => now < s.startTime);
    const allDone = slots.every(s => now >= s.endTime);

    banner.style.display = 'flex';
    if (current) {
      document.getElementById('bannerIcon').textContent = '🟢';
      document.getElementById('bannerText').textContent = `סבב ${current.index + 1} פעיל כרגע`;
      document.getElementById('bannerTime').textContent = current.label;
      banner.style.borderColor = 'rgba(34,197,94,.2)';
    } else if (next) {
      const mins = Math.ceil((next.startTime - now) / 60000);
      document.getElementById('bannerIcon').textContent = '🔵';
      document.getElementById('bannerText').textContent = `סבב ${next.index + 1} מתחיל בעוד ${mins} דק'`;
      document.getElementById('bannerTime').textContent = next.label;
      banner.style.borderColor = 'rgba(59,130,246,.2)';
    } else if (allDone) {
      document.getElementById('bannerIcon').textContent = '🏁';
      document.getElementById('bannerText').textContent = 'כל הסבבים הסתיימו';
      document.getElementById('bannerTime').textContent = '';
      banner.style.borderColor = 'var(--border)';
    }
  }

  // Slots list
  const list = document.getElementById('slotsList');
  if (slots.length > 0) {
    list.innerHTML = slots.map(s => {
      const isCurrent = now >= s.startTime && now < s.endTime;
      const isPast = now >= s.endTime;
      const cls = isCurrent ? 'active' : isPast ? 'past' : '';
      const regPct = Math.min((s.registered / max) * 100, 100);
      let barColor = 'var(--green)';
      if (regPct >= 90) barColor = 'var(--red)';
      else if (regPct >= 70) barColor = 'var(--yellow)';
      else if (regPct >= 50) barColor = 'var(--blue)';

      return `<div class="slot-card ${cls}">
        <div class="slot-top">
          <div class="slot-name">
            <span class="slot-time-text">${s.label}</span>
            <span class="slot-num-text">סבב ${s.index + 1}</span>
            ${isCurrent ? '<span class="now-tag">עכשיו</span>' : ''}
          </div>
          <span class="slot-count-text" style="color:${regPct >= 90 ? 'var(--red)' : regPct >= 70 ? 'var(--yellow)' : 'var(--muted)'}">
            ${s.registered}/${max}
          </span>
        </div>
        <div class="slot-bar">
          <div class="slot-bar-fill" style="width:${regPct}%;background:${barColor}"></div>
        </div>
      </div>`;
    }).join('');
  }
}

// Update page title with count
setInterval(() => {
  if (prevCount >= 0) document.title = `(${prevCount}) לייב - מצב האירוע`;
}, 5000);
</script>
</body>
</html>
