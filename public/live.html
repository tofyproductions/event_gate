<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="refresh" content="30">
  <title>מצב האירוע - צפייה בלבד</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #22c55e;
      --yellow: #eab308;
      --orange: #f97316;
      --red: #ef4444;
      --blue: #3b82f6;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --muted: #94a3b8;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }
    .header {
      background: var(--card);
      padding: 16px 20px;
      text-align: center;
      border-bottom: 1px solid #334155;
    }
    .header h1 { font-size: 1.2rem; }
    .header .live-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      margin-left: 8px;
      animation: blink 1.5s infinite;
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    .header .sub { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }

    /* Counter */
    .counter-section {
      padding: 30px 20px 20px;
      text-align: center;
    }
    .counter-ring {
      width: 200px;
      height: 200px;
      margin: 0 auto 16px;
      position: relative;
    }
    .counter-ring svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .counter-ring .bg-circle {
      fill: none;
      stroke: #334155;
      stroke-width: 12;
    }
    .counter-ring .progress-circle {
      fill: none;
      stroke-width: 12;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.5s ease, stroke 0.3s ease;
    }
    .counter-inner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .counter-number {
      font-size: 3.5rem;
      font-weight: 800;
      line-height: 1;
      transition: color 0.3s;
    }
    .counter-label {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
    }
    .counter-max {
      font-size: 1rem;
      color: var(--muted);
    }

    /* Status */
    .status-bar {
      text-align: center;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 12px;
      margin: 0 20px 20px;
    }
    .status-ok { background: rgba(34,197,94,0.12); color: var(--green); }
    .status-warn { background: rgba(234,179,8,0.12); color: var(--yellow); }
    .status-danger { background: rgba(249,115,22,0.12); color: var(--orange); }
    .status-full { background: rgba(239,68,68,0.15); color: var(--red); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }

    /* Slots */
    .slots-section {
      padding: 0 20px 20px;
    }
    .slots-title {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .slot-row {
      background: var(--card);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-right: 3px solid var(--blue);
    }
    .slot-row.active { border-color: var(--green); background: rgba(34,197,94,0.05); }
    .slot-row.past { opacity: 0.4; }
    .slot-time { font-weight: 600; font-size: 0.9rem; direction: ltr; }
    .slot-num { font-size: 0.75rem; color: var(--muted); }
    .slot-count { font-size: 0.85rem; color: var(--muted); }
    .slot-active-tag {
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(34,197,94,0.15);
      color: var(--green);
      font-weight: 600;
      margin-right: 6px;
    }

    /* Bar */
    .slot-bar {
      width: 100%;
      height: 4px;
      background: #334155;
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }
    .slot-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s;
    }

    .not-configured {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .not-configured .icon { font-size: 3rem; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>מצב האירוע <span class="live-dot"></span></h1>
    <div class="sub">צפייה בלבד — מתעדכן בזמן אמת</div>
  </div>

  <div id="notConfigured" class="not-configured" style="display:none;">
    <div class="icon">🔧</div>
    <div>האירוע טרם הוגדר</div>
  </div>

  <div id="mainContent">
    <div class="counter-section">
      <div class="counter-ring">
        <svg viewBox="0 0 200 200">
          <circle class="bg-circle" cx="100" cy="100" r="88" />
          <circle class="progress-circle" id="progressCircle" cx="100" cy="100" r="88" />
        </svg>
        <div class="counter-inner">
          <div class="counter-number" id="currentCount">0</div>
          <div class="counter-label">נוכחים כרגע</div>
          <div class="counter-max">מתוך <span id="maxCap">50</span></div>
        </div>
      </div>
    </div>

    <div class="status-bar status-ok" id="statusBar">ממתין לאורחים</div>

    <div class="slots-section">
      <div class="slots-title">סבבים</div>
      <div id="slotsList"></div>
    </div>
  </div>

  <script>
    const circumference = 2 * Math.PI * 88;

    function connectSSE() {
      const evtSource = new EventSource('/api/events/public');
      evtSource.onmessage = (e) => {
        try {
          const state = JSON.parse(e.data);
          render(state);
        } catch {}
      };
      evtSource.onerror = () => {
        evtSource.close();
        setTimeout(connectSSE, 3000);
      };
    }
    connectSSE();

    function render(state) {
      if (!state.configured) {
        document.getElementById('notConfigured').style.display = 'block';
        document.getElementById('mainContent').style.display = 'none';
        return;
      }
      document.getElementById('notConfigured').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';

      const pct = state.currentCount / state.maxCapacity;
      const offset = circumference - (pct * circumference);

      const circle = document.getElementById('progressCircle');
      circle.style.strokeDasharray = circumference;
      circle.style.strokeDashoffset = offset;

      let color;
      if (pct >= 1) color = 'var(--red)';
      else if (pct >= 0.9) color = 'var(--orange)';
      else if (pct >= 0.7) color = 'var(--yellow)';
      else color = 'var(--green)';

      circle.style.stroke = color;
      const counterEl = document.getElementById('currentCount');
      counterEl.textContent = state.currentCount;
      counterEl.style.color = color;
      document.getElementById('maxCap').textContent = state.maxCapacity;

      // Status
      const statusBar = document.getElementById('statusBar');
      const remaining = state.maxCapacity - state.currentCount;
      statusBar.className = 'status-bar';
      if (state.currentCount >= state.maxCapacity) {
        statusBar.classList.add('status-full');
        statusBar.textContent = 'האירוע מלא כרגע';
      } else if (pct >= 0.9) {
        statusBar.classList.add('status-danger');
        statusBar.textContent = `נותרו ${remaining} מקומות בלבד!`;
      } else if (pct >= 0.7) {
        statusBar.classList.add('status-warn');
        statusBar.textContent = `נותרו ${remaining} מקומות`;
      } else if (state.currentCount === 0) {
        statusBar.classList.add('status-ok');
        statusBar.textContent = 'ממתין לאורחים';
      } else {
        statusBar.classList.add('status-ok');
        statusBar.textContent = `${remaining} מקומות פנויים`;
      }

      // Slots
      const slots = state.slotStats || [];
      const now = Date.now();
      const list = document.getElementById('slotsList');

      if (slots.length === 0) {
        list.innerHTML = '';
        return;
      }

      list.innerHTML = slots.map(slot => {
        const isCurrent = state.currentSlotIndex === slot.index;
        const isPast = now >= slot.endTime;
        let cls = '';
        if (isCurrent) cls = 'active';
        else if (isPast) cls = 'past';

        const regPct = Math.min((slot.registered / state.maxCapacity) * 100, 100);
        let barColor = 'var(--green)';
        if (regPct >= 90) barColor = 'var(--red)';
        else if (regPct >= 70) barColor = 'var(--yellow)';

        return `
          <div class="slot-row ${cls}">
            <div style="flex:1">
              <div>
                <span class="slot-time">${slot.label}</span>
                <span class="slot-num">סבב ${slot.index + 1}</span>
                ${isCurrent ? '<span class="slot-active-tag">עכשיו</span>' : ''}
              </div>
              <div class="slot-bar">
                <div class="slot-bar-fill" style="width:${regPct}%; background:${barColor}"></div>
              </div>
            </div>
            <span class="slot-count">${slot.registered}/${state.maxCapacity}</span>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
