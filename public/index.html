<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>טופי - הפקות אירועים</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;--card:#1e293b;--card2:#283548;--text:#f1f5f9;--muted:#94a3b8;
  --accent:#3b82f6;--accent2:#60a5fa;--green:#22c55e;--yellow:#eab308;--red:#ef4444;
  --orange:#f97316;--purple:#a78bfa;--border:#334155;--radius:12px;
}
html{font-size:16px}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
a{color:var(--accent2);text-decoration:none}
input,textarea,select,button{font-family:inherit;font-size:1rem;border:none;outline:none;border-radius:8px}
input,textarea,select{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:10px 14px;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:70px}
button{cursor:pointer;padding:10px 20px;border-radius:8px;font-weight:600;transition:all .2s}
.btn{background:var(--accent);color:#fff}
.btn:hover{background:var(--accent2)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{opacity:.9}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{opacity:.9}
.btn-orange{background:var(--orange);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:6px 14px;font-size:.85rem}
.btn-block{width:100%;display:block}
.card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:16px;border:1px solid var(--border)}
.card2{background:var(--card2);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.75rem;font-weight:600}
.badge-green{background:var(--green);color:#000}
.badge-yellow{background:var(--yellow);color:#000}
.badge-red{background:var(--red);color:#fff}
.badge-blue{background:var(--accent);color:#fff}
.badge-muted{background:var(--border);color:var(--muted)}
h1{font-size:1.8rem;margin-bottom:8px}
h2{font-size:1.4rem;margin-bottom:8px}
h3{font-size:1.1rem;margin-bottom:6px}
.text-muted{color:var(--muted)}
.text-green{color:var(--green)}
.text-yellow{color:var(--yellow)}
.text-red{color:var(--red)}
.text-center{text-align:center}
.mt-1{margin-top:8px}.mt-2{margin-top:16px}.mt-3{margin-top:24px}
.mb-1{margin-bottom:8px}.mb-2{margin-bottom:16px}
.gap-1{gap:8px}.gap-2{gap:16px}
.flex{display:flex}.flex-wrap{flex-wrap:wrap}.items-center{align-items:center}.justify-between{justify-content:space-between}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* Layout */
#app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--card);border-left:1px solid var(--border);padding:20px 16px;display:flex;flex-direction:column;position:fixed;top:0;right:0;bottom:0;z-index:100}
.sidebar .logo{font-size:1.2rem;font-weight:700;color:var(--accent2);margin-bottom:24px;text-align:center}
.sidebar .nav-item{padding:10px 14px;border-radius:8px;cursor:pointer;margin-bottom:4px;color:var(--muted);transition:all .2s;display:flex;align-items:center;gap:8px}
.sidebar .nav-item:hover,.sidebar .nav-item.active{background:var(--bg);color:var(--text)}
.sidebar .nav-item.active{border-right:3px solid var(--accent)}
.main{flex:1;margin-right:220px;padding:24px;max-width:960px}
.bottom-nav{display:none}

@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-right:0;padding:16px;padding-bottom:80px}
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);z-index:100;justify-content:space-around;padding:8px 0}
  .bottom-nav .bnav-item{text-align:center;padding:6px 8px;color:var(--muted);font-size:.7rem;cursor:pointer;flex:1}
  .bottom-nav .bnav-item.active{color:var(--accent2)}
  .bottom-nav .bnav-item .bnav-icon{font-size:1.3rem;display:block;margin-bottom:2px}
  .grid2{grid-template-columns:1fr}
  .grid4{grid-template-columns:1fr 1fr}
  h1{font-size:1.4rem}
}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--card);border-radius:var(--radius);padding:40px;max-width:380px;width:100%;text-align:center}

/* Counter ring */
.counter-ring{position:relative;width:180px;height:180px;margin:0 auto}
.counter-ring svg{transform:rotate(-90deg)}
.counter-ring .ring-bg{fill:none;stroke:var(--border);stroke-width:10}
.counter-ring .ring-fg{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .5s,stroke .3s}
.counter-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.counter-num{font-size:2.5rem;font-weight:700;line-height:1}
.counter-label{font-size:.8rem;color:var(--muted)}

/* Stat boxes */
.stat-box{text-align:center;padding:12px;background:var(--bg);border-radius:8px}
.stat-num{font-size:1.6rem;font-weight:700}
.stat-label{font-size:.75rem;color:var(--muted)}

/* Guest row */
.guest-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg);border-radius:8px;margin-bottom:6px}
.guest-info{flex:1}
.guest-name{font-weight:600}
.guest-meta{font-size:.8rem;color:var(--muted)}

/* Slots */
.slot-card{background:var(--bg);border-radius:8px;padding:10px 14px;text-align:center}
.slot-time{font-size:.85rem;font-weight:600}
.slot-count{font-size:1.3rem;font-weight:700;margin:4px 0}

/* Registration page */
.reg-hero{background:linear-gradient(135deg,#1e3a5f,#0f172a);border-radius:var(--radius);padding:30px;text-align:center;margin-bottom:20px;border:1px solid var(--border)}

/* Check-in */
.checkin-input{font-size:1.8rem;text-align:center;letter-spacing:4px;padding:16px;text-transform:uppercase}
.checkin-result{padding:20px;border-radius:var(--radius);text-align:center;margin-top:16px}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto}
.tab{padding:8px 16px;border-radius:8px;cursor:pointer;white-space:nowrap;background:var(--card2);color:var(--muted);font-size:.9rem}
.tab.active{background:var(--accent);color:#fff}

/* Timeline */
.timeline-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin:12px 0}
.timeline-fill{height:100%;background:var(--green);border-radius:4px;transition:width .5s}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);padding:12px 24px;border-radius:8px;z-index:9999;font-weight:600;animation:toastIn .3s}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Footer */
.footer{text-align:center;padding:30px 16px;color:var(--muted);font-size:.8rem;border-top:1px solid var(--border);margin-top:40px}

.hidden{display:none!important}
.form-group{margin-bottom:14px}
.form-group label{display:block;margin-bottom:4px;font-size:.85rem;color:var(--muted)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.form-row{grid-template-columns:1fr}}

.event-group-title{font-size:.9rem;color:var(--muted);margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.event-group-title::after{content:'';flex:1;height:1px;background:var(--border)}

.share-box{background:var(--bg);border-radius:8px;padding:12px;display:flex;align-items:center;gap:8px;margin-bottom:8px}
.share-box input{flex:1;font-size:.8rem}

.slot-selectable{cursor:pointer;border:2px solid transparent;transition:border-color .2s}
.slot-selectable:hover{border-color:var(--accent)}
.slot-selectable.selected{border-color:var(--accent);background:rgba(59,130,246,.1)}
.slot-selectable.disabled{opacity:.5;cursor:default;pointer-events:none}
</style>
</head>

<script>
// ===================== STATE =====================
let adminToken = localStorage.getItem('eventGateAdminToken') || '';
let currentPage = 'dashboard';
let currentEventId = null;
let refreshTimer = null;
let allEvents = [];

// ===================== INIT =====================
(function init() {
  const params = new URLSearchParams(location.search);
  if (params.get('event')) {
    showPublicRegistration(params.get('event'));
  } else if (params.get('client')) {
    showClientView(params.get('client'));
  } else if (adminToken) {
    verifyAdmin();
  } else {
    showLogin();
  }
})();

// ===================== API =====================
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (adminToken && !opts.noAuth) headers['x-admin-token'] = adminToken;
  const fetchOpts = { ...opts, headers };
  if (opts.body) fetchOpts.body = JSON.stringify(opts.body);
  const res = await fetch(path, fetchOpts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'שגיאה');
  return data;
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ===================== UTILS =====================
function formatPhone(p) {
  if (!p) return '';
  let n = p.replace(/[^0-9]/g, '');
  if (n.startsWith('0')) n = '972' + n.slice(1);
  return n;
}
function waLink(phone, text) {
  return 'https://wa.me/' + formatPhone(phone) + '?text=' + encodeURIComponent(text);
}
function wazeLink(addr) {
  return 'https://waze.com/ul?q=' + encodeURIComponent(addr);
}
function calLink(name, startTime, totalMin, addr) {
  const s = new Date(startTime);
  const e = new Date(startTime + (totalMin || 60) * 60000);
  const fmt = d => d.toISOString().replace(/[-:]/g, '').replace(/\.\d+/, '');
  return 'https://calendar.google.com/calendar/render?action=TEMPLATE&text=' + encodeURIComponent(name) + '&dates=' + fmt(s) + '/' + fmt(e) + '&location=' + encodeURIComponent(addr || '');
}
function fmtDate(d) {
  if (!d) return '';
  const p = d.split('-');
  return p[2] + '/' + p[1] + '/' + p[0];
}
function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
}
function isToday(dateStr) {
  return dateStr === new Date().toISOString().split('T')[0];
}
function isPast(dateStr) {
  return dateStr < new Date().toISOString().split('T')[0];
}
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast('הועתק!')).catch(() => {});
}
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ===================== AUTH =====================
function showLogin() {
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
}

async function doLogin() {
  const token = document.getElementById('login-token').value.trim();
  if (!token) return;
  adminToken = token;
  try {
    await api('/api/events');
    localStorage.setItem('eventGateAdminToken', token);
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    navigateTo('dashboard');
  } catch {
    document.getElementById('login-error').textContent = 'טוקן שגוי';
    adminToken = '';
  }
}

async function verifyAdmin() {
  try {
    await api('/api/events');
    document.getElementById('app').classList.remove('hidden');
    navigateTo('dashboard');
  } catch {
    adminToken = '';
    localStorage.removeItem('eventGateAdminToken');
    showLogin();
  }
}

function logout() {
  adminToken = '';
  localStorage.removeItem('eventGateAdminToken');
  stopRefresh();
  document.getElementById('app').classList.add('hidden');
  showLogin();
}

// ===================== NAVIGATION =====================
function stopRefresh() { if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; } }

function navigateTo(page, data) {
  stopRefresh();
  currentPage = page;
  currentEventId = data || null;

  document.querySelectorAll('.sidebar .nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  document.querySelectorAll('.bottom-nav .bnav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));

  const routes = {
    dashboard: renderDashboard,
    setup: renderSetup,
    manage: renderManage,
    checkin: renderCheckin,
    live: renderLive,
    members: renderMembers
  };
  if (routes[page]) routes[page](data);
}

function setMain(html) {
  document.getElementById('main-content').innerHTML = html +

      '<div style="margin-bottom:4px">&#127880; טופי - הפקות אירועים</div>' +

// ===================== COUNTER RING =====================
function counterRing(current, max, size) {
  size = size || 180;
  const r = (size - 20) / 2;
  const c = Math.PI * 2 * r;
  const pct = Math.min(current / Math.max(max, 1), 1);
  const offset = c * (1 - pct);
  const color = pct < 0.7 ? 'var(--green)' : pct < 0.9 ? 'var(--yellow)' : 'var(--red)';
  const half = size / 2;
  return '<div class="counter-ring" style="width:' + size + 'px;height:' + size + 'px">' +
    '<svg width="' + size + '" height="' + size + '"><circle class="ring-bg" cx="' + half + '" cy="' + half + '" r="' + r + '"/>' +
    '<circle class="ring-fg" cx="' + half + '" cy="' + half + '" r="' + r + '" stroke="' + color + '" stroke-dasharray="' + c + '" stroke-dashoffset="' + offset + '"/></svg>' +
    '<div class="counter-center"><div class="counter-num">' + current + '</div><div class="counter-label">מתוך ' + max + '</div></div></div>';
}

function statusMsg(current, max) {
  const pct = current / Math.max(max, 1);
  if (pct >= 1) return '<span class="text-red">&#9888; מלא!</span>';
  if (pct >= 0.9) return '<span class="text-red">כמעט מלא!</span>';
  if (pct >= 0.7) return '<span class="text-yellow">מתמלא</span>';
  return '<span class="text-green">&#10003; פתוח - יש מקום</span>';
}

// ===================== DASHBOARD =====================
async function renderDashboard() {
  setMain('<div class="text-center text-muted mt-3">&#8987; טוען...</div>');
  try {
    const data = await api('/api/events');
    allEvents = data.events || [];
    const todayEvs = allEvents.filter(e => isToday(e.date)).sort((a, b) => (a.startTime || 0) - (b.startTime || 0));
    const upcoming = allEvents.filter(e => !isToday(e.date) && !isPast(e.date)).sort((a, b) => a.date.localeCompare(b.date));
    const past = allEvents.filter(e => isPast(e.date)).sort((a, b) => b.date.localeCompare(a.date));

    let html = '<div class="flex justify-between items-center mb-2">' +
      '<h1>&#128202; לוח בקרה</h1>' +
      '<button class="btn" onclick="navigateTo(\'setup\')">+ אירוע חדש</button></div>';

    function evCards(evs, title, badgeCls) {
      if (!evs.length) return '';
      let h = '<div class="event-group-title">' + title + '</div>';
      evs.forEach(ev => {
        const regLink = location.origin + location.pathname + '?event=' + ev.id;
        const clientLink = location.origin + location.pathname + '?client=' + ev.clientToken;
        const waMsg = 'היי ' + (ev.contactName || ev.clientName) + '!' +
          '\n\nקישור צפייה באירוע:\n' + clientLink +
          '\n\nקישור הרשמה:\n' + regLink +
          '\n\nטופי - הפקות אירועים';
        h += '<div class="card">' +
          '<div class="flex justify-between items-center mb-1"><div>' +
          '<h3>' + esc(ev.eventName || 'אירוע') + '</h3>' +
          '<div class="text-muted" style="font-size:.85rem">' + esc(ev.clientName) + ' | ' + fmtDate(ev.date) + '</div>' +
          '</div>' + (badgeCls ? '<span class="badge ' + badgeCls + '">' + title + '</span>' : '') + '</div>' +
          '<div class="flex gap-1 flex-wrap mt-1" style="font-size:.8rem">' +
          '<span class="badge badge-blue">&#128101; פעילים: ' + (ev.activeCount || 0) + '</span>' +
          '<span class="badge badge-muted">&#128203; נרשמו: ' + (ev.preRegCount || 0) + '</span></div>' +
          '<div class="flex gap-1 flex-wrap mt-2">' +
          '<button class="btn btn-sm" onclick="navigateTo(\'manage\',\'' + ev.id + '\')">&#128736; ניהול</button>' +
          '<button class="btn-outline btn-sm" onclick="navigateTo(\'setup\',\'' + ev.id + '\')">&#9998; עריכה</button>' +
          (ev.contactPhone ? '<a href="' + waLink(ev.contactPhone, waMsg) + '" target="_blank" class="btn-sm btn-green" style="display:inline-block;text-decoration:none;padding:6px 14px;border-radius:8px">&#128172; וואטסאפ</a>' : '') +
          '</div></div>';
      });
      return h;
    }

    html += evCards(todayEvs, 'היום', 'badge-green');
    html += evCards(upcoming, 'קרוב', 'badge-blue');
    html += evCards(past, 'עבר', 'badge-muted');

    if (!allEvents.length) {
      html += '<div class="card text-center text-muted"><p>אין אירועים עדיין</p><button class="btn mt-2" onclick="navigateTo(\'setup\')">צור אירוע ראשון</button></div>';
    }
    setMain(html);
  } catch (e) {
    setMain('<div class="card text-center text-red">' + esc(e.message) + '</div>');
  }
}

    '<button class="btn-outline btn-block" onclick="navigateTo(\'dashboard\')">ביטול</button></div>' +

function previewSlots() {
  const date = document.getElementById('f-date').value;
  const time = document.getElementById('f-time').value;
  const n = parseInt(document.getElementById('f-numSlots').value) || 5;
  const d = parseInt(document.getElementById('f-slotDurationMin').value) || 30;
  if (!date || !time) { toast('הזן תאריך ושעה', 'error'); return; }
  const start = new Date(date + 'T' + time).getTime();
  let html = '<div class="grid3">';
  for (let i = 0; i < n; i++) {
    const s = start + i * d * 60000;
    const e = s + d * 60000;
    html += '<div class="slot-card"><div class="slot-time">' + fmtTime(s) + ' - ' + fmtTime(e) + '</div><div class="text-muted" style="font-size:.75rem">חלון ' + (i + 1) + '</div></div>';
  }
  html += '</div>';
  document.getElementById('slot-preview').innerHTML = html;
}

async function saveEvent(editId) {
  const body = {
    clientName: document.getElementById('f-clientName').value,
    eventName: document.getElementById('f-eventName').value,
    contactName: document.getElementById('f-contactName').value,
    contactPhone: document.getElementById('f-contactPhone').value,

    time: document.getElementById('f-time').value,
    numSlots: parseInt(document.getElementById('f-numSlots').value),
    slotDurationMin: parseInt(document.getElementById('f-slotDurationMin').value),
    maxCapacity: parseInt(document.getElementById('f-maxCapacity').value),
    eventAddress: document.getElementById('f-eventAddress').value,
    attractions: document.getElementById('f-attractions').value,
  };
  try {
    let result;
    if (editId) {
      result = await api('/api/events/' + editId, { method: 'PUT', body: body });
    } else {
      result = await api('/api/events', { method: 'POST', body: body });
    }
    toast(editId ? 'אירוע עודכן!' : 'אירוע נוצר!');
    const ev = result.event;
    const regLink = location.origin + location.pathname + '?event=' + ev.id;
    const clientLink = location.origin + location.pathname + '?client=' + ev.clientToken;
    document.getElementById('share-section').innerHTML =
      '<div class="card mt-2"><h3>&#128279; קישורי שיתוף</h3>' +
      '<div class="mb-1 text-muted" style="font-size:.85rem">קישור הרשמה</div>' +
      '<div class="share-box"><input value="' + regLink + '" readonly onclick="this.select()">' +
      '<button class="btn btn-sm" onclick="copyText(\'' + regLink + '\')">&#128203;</button>' +
      '<a href="' + waLink('', 'הנה קישור הרשמה לאירוע: ' + regLink) + '" target="_blank" class="btn-green btn-sm" style="display:inline-block;padding:6px 12px;border-radius:8px;text-decoration:none">&#128172;</a></div>' +
      '<div class="mb-1 text-muted" style="font-size:.85rem">קישור צפייה ללקוח</div>' +
      '<div class="share-box"><input value="' + clientLink + '" readonly onclick="this.select()">' +
      '<button class="btn btn-sm" onclick="copyText(\'' + clientLink + '\')">&#128203;</button>' +
      '<a href="' + waLink(ev.contactPhone || '', 'היי! הנה קישור צפייה באירוע שלך: ' + clientLink) + '" target="_blank" class="btn-green btn-sm" style="display:inline-block;padding:6px 12px;border-radius:8px;text-decoration:none">&#128172;</a></div>' +

async function deleteEvent(id) {

    await api('/api/events/' + id, { method: 'DELETE' });
    toast('אירוע נמחק');
    navigateTo('dashboard');
  } catch (e) { toast(e.message, 'error'); }
}

// ===================== EVENT MANAGEMENT =====================
async function renderManage(eventId) {
  if (!eventId) { navigateTo('dashboard'); return; }
  currentEventId = eventId;

  async function load() {
    try {
      const ev = await api('/api/events/' + eventId + '/full');
      const guests = Object.values(ev.guests || {});
      const preRegs = Object.values(ev.preRegs || {});
      const active = guests.filter(g => !g.checkoutTime);
      const history = guests.filter(g => g.checkoutTime);
      const ac = active.reduce((s, g) => s + (g.groupSize || 1), 0);
      const totalVisited = guests.reduce((s, g) => s + (g.groupSize || 1), 0);
      const pending = preRegs.filter(r => !r.arrived);
      const walkins = active.filter(g => g.type === 'walkin');

      const slotRegs = {};
      (ev.slots || []).forEach(s => { slotRegs[s.index] = 0; });
      preRegs.forEach(r => { slotRegs[r.slotIndex] = (slotRegs[r.slotIndex] || 0) + (r.participants || 1); });

      let html = '<div class="flex justify-between items-center mb-1"><div>' +
        '<h1>' + esc(ev.eventName || 'אירוע') + '</h1>' +
        '<div class="text-muted">' + esc(ev.clientName) + ' | ' + fmtDate(ev.date) + ' | ' + fmtTime(ev.startTime) + '</div></div>' +
        '<button class="btn-outline btn-sm" onclick="navigateTo(\'dashboard\')">&#8592; חזרה</button></div>' +

        '<div class="text-center mt-2">' + counterRing(ac, ev.maxCapacity) +
        '<div class="mt-1" style="font-size:1.1rem">' + statusMsg(ac, ev.maxCapacity) + '</div></div>' +

        '<div class="grid4 mt-2">' +
        '<div class="stat-box"><div class="stat-num">' + totalVisited + '</div><div class="stat-label">ביקרו סה"כ</div></div>' +
        '<div class="stat-box"><div class="stat-num text-green">' + preRegs.length + '</div><div class="stat-label">נרשמו</div></div>' +
        '<div class="stat-box"><div class="stat-num text-yellow">' + pending.length + '</div><div class="stat-label">ממתינים</div></div>' +
        '<div class="stat-box"><div class="stat-num" style="color:var(--orange)">' + walkins.length + '</div><div class="stat-label">ווק-אין</div></div></div>' +

        '<h3 class="mt-3 mb-1">&#128339; חלונות זמן</h3><div class="grid3">';
      (ev.slots || []).forEach(s => {
        html += '<div class="slot-card"><div class="slot-time">' + s.label + '</div><div class="slot-count">' + (slotRegs[s.index] || 0) + '</div><div class="text-muted" style="font-size:.7rem">נרשמו</div></div>';
      });
      html += '</div>';

      // Active guests
      if (active.length) {
        html += '<h3 class="mt-3 mb-1">&#127939; פעילים כרגע (' + active.length + ')</h3>';
        active.forEach(g => {
          html += '<div class="guest-row"><div class="guest-info"><div class="guest-name">' + esc(g.name) +
            ' <span class="badge ' + (g.type === 'walkin' ? 'badge-yellow' : 'badge-blue') + '" style="font-size:.65rem">' +
            (g.type === 'walkin' ? 'ווק-אין' : g.regCode || 'נרשם') + '</span></div>' +
            '<div class="guest-meta">&#128101; ' + (g.groupSize || 1) + ' | ' + fmtTime(g.checkinTime) + '</div></div>' +
            '<button class="btn-red btn-sm" onclick="doCheckout(\'' + eventId + '\',\'' + g.id + '\')">יציאה</button></div>';
        });
      }

      // Pending pre-regs
      if (pending.length) {
        html += '<h3 class="mt-3 mb-1">&#128203; ממתינים לצ\'ק-אין (' + pending.length + ')</h3>';
        pending.forEach(r => {
          html += '<div class="guest-row"><div class="guest-info"><div class="guest-name">' + esc(r.name) +
            ' <span class="badge badge-muted" style="font-size:.65rem">' + r.code + '</span></div>' +
            '<div class="guest-meta">&#128101; ' + (r.participants || 1) + ' | חלון ' + (r.slotIndex + 1) +
            (r.phone ? ' | ' + r.phone : '') + '</div></div>' +
            '<div class="flex gap-1">' +
            '<button class="btn btn-sm" onclick="quickCheckin(\'' + eventId + '\',\'' + r.code + '\',' + (r.participants || 1) + ')">&#10003; כניסה</button>' +
            '<button class="btn-red btn-sm" onclick="releaseReg(\'' + eventId + '\',\'' + r.code + '\')">&#128465;</button>' +
            '</div></div>';
        });
      }

      // History
      if (history.length) {
        html += '<h3 class="mt-3 mb-1">&#128214; היסטוריה (' + history.length + ')</h3>';
        history.slice().sort((a, b) => b.checkoutTime - a.checkoutTime).slice(0, 30).forEach(g => {
          html += '<div class="guest-row" style="opacity:.6"><div class="guest-info"><div class="guest-name">' + esc(g.name) + '</div>' +
            '<div class="guest-meta">כניסה: ' + fmtTime(g.checkinTime) + ' | יציאה: ' + fmtTime(g.checkoutTime) + ' | &#128101; ' + (g.groupSize || 1) + '</div></div></div>';
        });
      }

      setMain(html);
    } catch (e) {
      setMain('<div class="card text-red text-center">' + esc(e.message) + '</div>');
    }
  }

  await load();
  refreshTimer = setInterval(load, 3000);
}

async function renderCheckin() {

    const todayEvs = (data.events || []).filter(e => isToday(e.date));

      if (todayEvs.length > 1) {
        html += '<div class="tabs mt-1">';
        todayEvs.forEach(e => {
          html += '<div class="tab ' + (e.id === selectedId ? 'active' : '') + '" onclick="window._ciSelect(\'' + e.id + '\')">' + esc(e.eventName) + '</div>';

    window._ciSelect = function(id) { selectedId = id; render(); };
    render();
  } catch (e) {
    setMain('<div class="card text-red">' + esc(e.message) + '</div>');
  }

async function submitCheckin(eventId) {
  const code = document.getElementById('checkin-code').value.trim();
  if (!code) return;
  const resultEl = document.getElementById('checkin-result');
  try {
    const res = await api('/api/events/' + eventId + '/checkin', { method: 'POST', body: { code: code, type: 'preregistered' } });
    resultEl.innerHTML = '<div class="checkin-result" style="background:var(--green);color:#000">' +
      '<div style="font-size:3rem">&#10003;</div><h2>' + esc(res.guest.name) + '</h2>' +
      '<div>&#128101; ' + (res.guest.groupSize || 1) + ' אורחים</div></div>';
    document.getElementById('checkin-code').value = '';
    document.getElementById('checkin-code').focus();
    setTimeout(function() { if (resultEl) resultEl.innerHTML = ''; }, 4000);
  } catch (e) {
    resultEl.innerHTML = '<div class="checkin-result" style="background:var(--red)">' +
      '<div style="font-size:3rem">&#10007;</div><h2>' + esc(e.message) + '</h2></div>';
    setTimeout(function() { if (resultEl) resultEl.innerHTML = ''; }, 4000);
  }
}

async function submitWalkin(eventId) {
  const name = document.getElementById('walkin-name').value.trim();
  const size = parseInt(document.getElementById('walkin-size').value) || 1;
  if (!name) { toast('הזן שם', 'error'); return; }
  try {
    const res = await api('/api/events/' + eventId + '/checkin', { method: 'POST', body: { name: name, groupSize: size, type: 'walkin' } });
    toast(res.guest.name + ' נכנס/ה!');
    document.getElementById('walkin-name').value = '';
    document.getElementById('walkin-size').value = '1';
  } catch (e) { toast(e.message, 'error'); }
}

// ===================== LIVE VIEW =====================
async function renderLive() {
  let selectedId = null;

  async function load() {
    try {
      const data = await api('/api/events');
      const todayEvs = (data.events || []).filter(e => isToday(e.date));

      if (!todayEvs.length) {
        setMain('<h1>&#128308; שידור חי</h1><div class="card mt-2 text-center text-muted">אין אירועים היום</div>');
        return;
      }

      if (!selectedId || !todayEvs.find(e => e.id === selectedId)) selectedId = todayEvs[0].id;

      const ev = await api('/api/events/' + selectedId + '/full');
      const guests = Object.values(ev.guests || {});
      const preRegs = Object.values(ev.preRegs || {});
      const active = guests.filter(g => !g.checkoutTime);
      const ac = active.reduce((s, g) => s + (g.groupSize || 1), 0);
      const totalVisited = guests.reduce((s, g) => s + (g.groupSize || 1), 0);

      // Timeline progress
      const now = Date.now();
      const lastSlot = ev.slots && ev.slots.length ? ev.slots[ev.slots.length - 1].endTime : ev.startTime + 3600000;
      const totalDur = lastSlot - ev.startTime;
      const elapsed = Math.max(0, Math.min(now - ev.startTime, totalDur));
      const pct = totalDur > 0 ? Math.round((elapsed / totalDur) * 100) : 0;

      let html = '<h1>&#128308; שידור חי</h1>';

      if (todayEvs.length > 1) {
        html += '<div class="tabs mt-1">';
        todayEvs.forEach(e => {
          html += '<div class="tab ' + (e.id === selectedId ? 'active' : '') + '" onclick="window._liveSelect(\'' + e.id + '\')">' + esc(e.eventName) + '</div>';
        });
        html += '</div>';
      }

      html += '<div class="card text-center">' +
        '<h2>' + esc(ev.eventName) + '</h2>' +
        '<div class="text-muted">' + esc(ev.clientName) + ' | ' + fmtDate(ev.date) + '</div>' +
        '<div class="timeline-bar mt-2"><div class="timeline-fill" style="width:' + pct + '%"></div></div>' +
        '<div class="text-muted" style="font-size:.75rem">' + pct + '% מהאירוע חלף</div>' +
        '<div class="mt-2">' + counterRing(ac, ev.maxCapacity, 200) + '</div>' +
        '<div class="mt-1" style="font-size:1.1rem">' + statusMsg(ac, ev.maxCapacity) + '</div></div>' +

        '<div class="grid4 mt-1">' +
        '<div class="stat-box"><div class="stat-num">' + totalVisited + '</div><div class="stat-label">ביקרו</div></div>' +
        '<div class="stat-box"><div class="stat-num text-green">' + preRegs.length + '</div><div class="stat-label">נרשמו</div></div>' +
        '<div class="stat-box"><div class="stat-num text-yellow">' + preRegs.filter(r => !r.arrived).length + '</div><div class="stat-label">ממתינים</div></div>' +
        '<div class="stat-box"><div class="stat-num">' + ac + '</div><div class="stat-label">כרגע באירוע</div></div></div>';

      // Recent activity
      const recentGuests = guests.slice().sort((a, b) => b.checkinTime - a.checkinTime).slice(0, 5);
      if (recentGuests.length) {
        html += '<h3 class="mt-3 mb-1">&#9889; פעילות אחרונה</h3>';
        recentGuests.forEach(g => {
          const isActive = !g.checkoutTime;
          html += '<div class="guest-row" style="' + (isActive ? '' : 'opacity:.5') + '"><div class="guest-info"><div class="guest-name">' + esc(g.name) +
            ' <span class="badge ' + (isActive ? 'badge-green' : 'badge-muted') + '" style="font-size:.65rem">' + (isActive ? 'פעיל' : 'יצא') + '</span></div>' +
            '<div class="guest-meta">&#128101; ' + (g.groupSize || 1) + ' | ' + fmtTime(g.checkinTime) + '</div></div></div>';
        });
      }

      setMain(html);
    } catch (e) {
      setMain('<div class="card text-red text-center">' + esc(e.message) + '</div>');
    }
  }

  window._liveSelect = function(id) { selectedId = id; };
  await load();
  refreshTimer = setInterval(load, 2000);
}

window.selectSlot = function(idx) {
  document.getElementById('r-slot').value = idx;
  document.querySelectorAll('#slot-selection .slot-selectable').forEach(function(el) {
    el.classList.toggle('selected', parseInt(el.dataset.slot) === idx);
  });
};

async function submitRegistration(eventId) {
  const name = document.getElementById('r-name').value.trim();
  const phone = document.getElementById('r-phone').value.trim();
  const participants = parseInt(document.getElementById('r-participants').value) || 1;
  const slotIndex = document.getElementById('r-slot').value;

  if (!name) { toast('נא להזין שם', 'error'); return; }
  if (slotIndex === '') { toast('נא לבחור חלון זמן', 'error'); return; }

  try {
    const ev = await api('/api/events/' + eventId, { noAuth: true });
    const res = await api('/api/events/' + eventId + '/register', {
      method: 'POST',
      body: { name: name, phone: phone, slotIndex: parseInt(slotIndex), participants: participants },
      noAuth: true
    });

    document.getElementById('reg-form-card').classList.add('hidden');
    const slot = res.slot;
    const totalMin = (ev.slotDurationMin || 30) * (ev.numSlots || 1);
    const calUrl = calLink(ev.eventName || 'אירוע', ev.startTime, totalMin, ev.eventAddress);
    const shareText = 'הצטרפו אלי לאירוע ' + (ev.eventName || '') + '! הרשמו כאן: ' + location.origin + location.pathname + '?event=' + eventId;

    document.getElementById('reg-success').innerHTML =
      '<div class="card text-center">' +
        '<div style="font-size:3.5rem">&#127881;</div>' +
        '<h2>נרשמת בהצלחה!</h2>' +
        '<div class="mt-2" style="background:var(--bg);padding:20px;border-radius:12px">' +
          '<div class="text-muted">קוד הכניסה שלך</div>' +
          '<div style="font-size:2.5rem;font-weight:700;letter-spacing:6px;color:var(--accent2);direction:ltr">' + res.code + '</div>' +
        '</div>' +
        '<div class="text-muted mt-1">&#128339; ' + slot.label + '</div>' +
        '<div class="mt-2 grid2">' +
          '<a href="' + calUrl + '" target="_blank" class="btn btn-block btn-sm" style="text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center">&#128197; הוסף ליומן</a>' +
          '<a href="' + waLink('', shareText) + '" target="_blank" class="btn-green btn-block btn-sm" style="text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center">&#128172; שתף חברים</a>' +
        '</div>' +
      '</div>' +

      '<div class="card">' +
        '<h3>&#128188; הצטרף למועדון חברים של טופי!</h3>' +
        '<p class="text-muted" style="font-size:.85rem">קבלו עדכונים על אירועים חדשים והטבות</p>' +
        '<div class="form-group mt-1"><label>שם</label><input id="m-name" value="' + esc(name) + '"></div>' +
        '<div class="form-group"><label>טלפון</label><input id="m-phone" value="' + esc(phone) + '" dir="ltr"></div>' +
        '<div class="form-group"><label>עיר</label><input id="m-city" placeholder="עיר מגורים"></div>' +
        '<div class="form-group"><label>גילאי ילדים</label><input id="m-ages" placeholder="לדוגמה: 3, 5, 8"></div>' +
        '<button class="btn btn-block" onclick="joinClub()">&#10024; הצטרף למועדון</button>' +
        '<div id="club-result"></div>' +
      '</div>';
  } catch (e) {
    toast(e.message, 'error');
  }
}
